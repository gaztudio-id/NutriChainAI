{% extends 'partials/base_kelompok.html' %}
{% block workspace %}
<div class="feature-container">
    <div class="card" style="padding: 20px;">
        <div class="detail-info-label" style="margin-bottom: 12px;">Generate Rekomendasi Menu</div>
        <div style="display: flex; gap: 12px; flex-wrap: wrap;">
            <input type="text" id="menu_utama" class="form-input" style="flex: 1; min-width: 200px;" placeholder="Masukkan menu utama (misal: Nasi Ayam Goreng)">
            <button onclick="generateK2()" class="btn btn-primary" style="min-height: auto; padding: 10px 20px;">Rekomendasikan</button>
        </div>
    </div>

    <div id="k2-result" class="result-box">
        <div class="result-title">
            Hasil Usulan Rekomendasi Menu
        </div>
        <div id="k2-suggestions-list" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 16px; margin-top: 16px;">
            <!-- Recommendations card list -->
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
async function generateK2() {
    const val = document.getElementById('menu_utama').value.strip ? document.getElementById('menu_utama').value.trim() : document.getElementById('menu_utama').value;
    if (!val) return;
    
    const res = await fetch('/kelompok-2/recommend', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ menu_utama: val })
    });
    const data = await res.json();
    const resultBox = document.getElementById('k2-result');
    const container = document.getElementById('k2-suggestions-list');
    
    resultBox.style.display = 'block';
    
    let html = '';
    data.recommendations.forEach((rec, idx) => {
        html += `
            <div class="card" style="padding: 16px; border: 1px solid var(--color-secondary);">
                <div class="detail-info-label" style="color: var(--color-primary); font-size: 13px; font-weight: 700; margin-bottom: 8px;">Set Alternatif ${idx + 1}</div>
                <div style="font-size: 13px; line-height: 1.6;">
                    <div>• <strong>Protein:</strong> ${rec.protein}</div>
                    <div>• <strong>Sayur:</strong> ${rec.sayur}</div>
                    <div>• <strong>Buah:</strong> ${rec.buah}</div>
                </div>
            </div>
        `;
    });
    container.innerHTML = html;

    if (document.getElementById('custom-result')) {
        const descList = data.recommendations.map((rec, i) => `Opsi ${i+1}: ${rec.protein}, ${rec.sayur}, ${rec.buah}`);
        document.getElementById('custom-result').value = `Menu Usulan (${val}): ` + descList.join(' | ');
    }
}
</script>
{% endblock %}
