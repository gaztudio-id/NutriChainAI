{% extends 'partials/base_kelompok.html' %}
{% block workspace %}
<div class="feature-container">
    <div class="card" style="padding: 20px; text-align: center;">
        <div class="detail-info-label" style="margin-bottom: 12px;">Metrik Sentimen Komentar YouTube</div>
        <button onclick="loadK6()" class="btn btn-primary" style="margin-bottom: 16px;">Ambil Status Sentimen YouTube</button>
        
        <div id="k6-result" class="result-box" style="text-align: left;">
            <div class="result-title">
                Hasil Pengawasan Sentimen YouTube
            </div>
            <div class="detail-info-grid" style="margin-top: 16px;">
                <div class="detail-info-item">
                    <div class="detail-info-label">Indeks Sentimen Rata-rata</div>
                    <div class="detail-info-value" id="k6-index">-</div>
                </div>
                <div class="detail-info-item">
                    <div class="detail-info-label">Total Komentar Terkumpul</div>
                    <div class="detail-info-value" id="k6-count">-</div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
async function loadK6() {
    const res = await fetch('/kelompok-6/api/status');
    const result = await res.json();
    
    document.getElementById('k6-result').style.display = 'block';
    document.getElementById('k6-index').textContent = result.index_sentimen;
    document.getElementById('k6-count').textContent = result.total_komentar + ' Komentar';

    if (document.getElementById('custom-result')) {
        document.getElementById('custom-result').value = `Sentimen YouTube: Indeks Rata-rata ${result.index_sentimen}, Total Komentar: ${result.total_komentar}`;
    }
}
</script>
{% endblock %}
